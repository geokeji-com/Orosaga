upstream orosaga_api {
  server api:3000;
  keepalive 32;
}

server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;
  server_tokens off;

  add_header X-Content-Type-Options nosniff always;
  add_header X-Frame-Options DENY always;
  add_header Referrer-Policy strict-origin-when-cross-origin always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
  add_header Content-Security-Policy "default-src 'self'; img-src 'self' data:; connect-src 'self'; style-src 'self'; script-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

  location ~ ^/(api|auth|healthz|readyz) {
    proxy_pass http://orosaga_api;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Request-ID $request_id;
  }

  location /assets/ {
    try_files $uri =404;
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  location = /favicon.svg {
    try_files $uri =404;
    expires 1h;
    add_header Cache-Control "public, max-age=3600";
  }

  location = / {
    try_files $uri /index.html;
    add_header Cache-Control "no-cache";
  }

  location ~ ^/(company|organization|systems|workflow(?:/[^/]+)?|camps|voices|forbidden|admin)/?$ {
    try_files $uri /index.html;
    add_header Cache-Control "no-cache";
  }

  location = /index.html {
    internal;
    add_header Cache-Control "no-cache";
  }

  location / {
    error_page 404 =404 /index.html;
    return 404;
  }
}
