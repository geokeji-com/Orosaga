name: orosaga

x-runtime: &runtime
  restart: unless-stopped
  read_only: true
  tmpfs:
    - /tmp
  init: true
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL
  stop_grace_period: 30s
  networks:
    - orosaga

services:
  migrate:
    profiles: ["operations"]
    image: orosaga-api:${OROSAGA_RELEASE_SHA:-local}
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      args:
        NODE_IMAGE: ${OROSAGA_NODE_IMAGE:-node:24.17.0-alpine3.23}
    env_file:
      - ${OROSAGA_DATABASE_ENV_FILE:-/opt/orosaga/shared/database.env}
    command:
      - sh
      - -c
      - node apps/api/dist/cli/preflight.js && cd apps/api && node ../../node_modules/prisma/build/index.js migrate deploy
    restart: "no"
    read_only: true
    tmpfs:
      - /tmp
    init: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks:
      - orosaga

  seed:
    image: orosaga-api:${OROSAGA_RELEASE_SHA:-local}
    profiles: ["operations"]
    env_file:
      - ${OROSAGA_DATABASE_ENV_FILE:-/opt/orosaga/shared/database.env}
    command:
      - sh
      - -c
      - cd apps/api && node ../../node_modules/tsx/dist/cli.mjs prisma/seed.ts
    volumes:
      - ./seed/legacy:/app/seed/legacy:ro
      - ./seed/private:/app/seed/private:ro
    restart: "no"
    read_only: true
    tmpfs:
      - /tmp
    init: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks:
      - orosaga

  ops:
    image: orosaga-api:${OROSAGA_RELEASE_SHA:-local}
    profiles: ["operations"]
    env_file:
      - ${OROSAGA_OPERATIONS_ENV_FILE:-/opt/orosaga/shared/operations.env}
    command: ["node", "--version"]
    volumes:
      - ./seed/legacy:/app/seed/legacy:ro
      - ./seed/private:/app/seed/private:ro
    restart: "no"
    read_only: true
    tmpfs:
      - /tmp
    init: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks:
      - orosaga

  api:
    <<: *runtime
    env_file:
      - ${OROSAGA_API_ENV_FILE:-/opt/orosaga/shared/api.env}
    image: orosaga-api:${OROSAGA_RELEASE_SHA:-local}
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      args:
        NODE_IMAGE: ${OROSAGA_NODE_IMAGE:-node:24.17.0-alpine3.23}
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - fetch('http://127.0.0.1:3000/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))
      interval: 10s
      timeout: 3s
      retries: 12
      start_period: 20s

  worker:
    <<: *runtime
    env_file:
      - ${OROSAGA_WORKER_ENV_FILE:-/opt/orosaga/shared/worker.env}
    image: orosaga-worker:${OROSAGA_RELEASE_SHA:-local}
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
      args:
        NODE_IMAGE: ${OROSAGA_NODE_IMAGE:-node:24.17.0-alpine3.23}

  web:
    restart: unless-stopped
    init: true
    security_opt:
      - no-new-privileges:true
    image: orosaga-web:${OROSAGA_RELEASE_SHA:-local}
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NODE_IMAGE: ${OROSAGA_NODE_IMAGE:-node:24.17.0-alpine3.23}
        NGINX_IMAGE: ${OROSAGA_NGINX_IMAGE:-nginx:1.28.3-alpine3.23}
    ports:
      - "127.0.0.1:18088:80"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1/healthz"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - orosaga

networks:
  orosaga:
    name: orosaga
