name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16.14-alpine3.23
        env:
          POSTGRES_DB: orosaga_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres -d orosaga_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/orosaga_test
      PUBLIC_ORIGIN: http://127.0.0.1:8080
      SESSION_SECRET: ci-only-session-secret-at-least-32-chars
      FEISHU_APP_ID: ci-placeholder
      FEISHU_APP_SECRET: ci-placeholder
      FEISHU_REDIRECT_URI: http://127.0.0.1:8080/auth/feishu/callback
      AUTH_DEV_BYPASS: "true"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24.17.0
          cache: npm
      - run: npm ci
      - run: npm run db:generate
      - run: npm run db:migrate
      - run: npm run db:seed
      - run: npm run lint
      - run: npx prettier --check .
      - run: npm run typecheck
      - run: npm run test:coverage
      - run: npm run build
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
      - name: Upload generated Linux visual baselines on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: visual-baselines-linux-${{ github.sha }}
          path: tests/e2e/visual.spec.ts-snapshots/*-chromium-linux.png
          if-no-files-found: ignore
      - run: npm run check:sql-comments
      - run: npm run check:bundle
      - run: npm run check:security
      - run: npm audit --audit-level=high
      - run: npm sbom --sbom-format=cyclonedx > orosaga-sbom.json
      - uses: actions/upload-artifact@v4
        with:
          name: web-${{ github.sha }}
          path: apps/web/dist
          if-no-files-found: error
      - uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ github.sha }}
          path: orosaga-sbom.json
          if-no-files-found: error

  images:
    runs-on: ubuntu-latest
    needs: verify
    strategy:
      matrix:
        include:
          - name: web
            dockerfile: apps/web/Dockerfile
          - name: api
            dockerfile: apps/api/Dockerfile
          - name: worker
            dockerfile: apps/worker/Dockerfile
    steps:
      - uses: actions/checkout@v6
      - name: Validate production Compose
        env:
          OROSAGA_RELEASE_SHA: ci
          OROSAGA_API_ENV_FILE: .env.production.example
          OROSAGA_WORKER_ENV_FILE: .env.production.example
          OROSAGA_DATABASE_ENV_FILE: .env.production.example
          OROSAGA_OPERATIONS_ENV_FILE: .env.production.example
        run: docker compose -f docker-compose.production.yml config >/dev/null
      - uses: docker/setup-buildx-action@v4
      - uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: false
          tags: orosaga/${{ matrix.name }}:${{ github.sha }}

  codeql:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
      packages: read
    steps:
      - uses: actions/checkout@v6
      - uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript
      - uses: github/codeql-action/analyze@v4
